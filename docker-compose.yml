services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3
    command: redis-server --appendonly yes --save 60 100
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: sh -c "pip install --quiet -e . && alembic upgrade head"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: >
      sh -c "pip install --quiet -e . &&
             uvicorn rag_benchmarking.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./sec_filings_pdf:/app/sec_filings_pdf:ro
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: >
      sh -c "pip install --quiet -e . &&
             celery -A rag_benchmarking.workers.celery_app:celery_app worker --loglevel=INFO -Q ingestion,evaluation"
    volumes:
      - ./backend:/app
      - ./sec_filings_pdf:/app/sec_filings_pdf:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  maintenance-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: >
      sh -c "pip install --quiet -e . &&
             celery -A rag_benchmarking.workers.celery_app:celery_app worker --loglevel=INFO -Q maintenance --concurrency=1"
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: >
      sh -c "pip install --quiet -e . &&
             celery -A rag_benchmarking.workers.celery_app:celery_app beat --loglevel=INFO"
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app/frontend
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  redis-data:
