services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3
    command: redis-server --appendonly yes --save 60 100
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # api / migrate / beat / maintenance-worker all share the lean Dockerfile,
  # which installs only `rag-benchmarking` and its workspace deps — no docling,
  # ragas, chonkie, pypdf, or mistral OCR client.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Bind-mounted source is owned by the host user; run as them so writeback
    # (alembic temp files, celerybeat-schedule, etc.) keeps host-friendly perms.
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    command: ["alembic", "upgrade", "head"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    command:
      [
        "uvicorn",
        "rag_benchmarking.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./sec_filings_pdf:/app/sec_filings_pdf:ro
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Ingestion worker: PDF + chunking deps only (pypdf, chonkie, mistral OCR).
  # Consumes the ingestion queue.
  ingestion-worker:
    build:
      context: ./backend
      dockerfile: packages/rag-ingestion-worker/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    command:
      [
        "celery",
        "-A", "rag_ingestion_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q", "ingestion",
      ]
    volumes:
      - ./backend:/app
      - ./sec_filings_pdf:/app/sec_filings_pdf:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Evaluation worker: RAGAS metric stack + rag-retrieval. Consumes the
  # evaluation queue. Kept separate from ingestion-worker so neither image
  # carries the other's heavy deps.
  evaluation-worker:
    build:
      context: ./backend
      dockerfile: packages/rag-evaluation-worker/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    command:
      [
        "celery",
        "-A", "rag_evaluation_worker.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q", "evaluation",
      ]
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  maintenance-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    command:
      [
        "celery",
        "-A", "rag_benchmarking.workers.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q", "maintenance",
        "--concurrency=1",
      ]
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./backend/.env
    # Beat's schedule file (a SQLite DBM) lives on a per-container tmpfs at
    # /var/celery, not in the bind-mounted source tree. This avoids
    # container-vs-host UID mismatches that make /app/celerybeat-schedule
    # unwritable, and keeps the workspace free of run-time artefacts. The mount
    # is created with `mode=1777` so the container user (whatever UID the
    # ${UID:-1000} substitution resolves to) can write to it. Losing the
    # schedule file on container restart is acceptable: our only beat entries
    # (sweep-stuck-jobs, purge-old-traces) are idempotent interval tasks.
    command:
      [
        "celery",
        "-A", "rag_benchmarking.workers.celery_app:celery_app",
        "beat",
        "--loglevel=INFO",
        "--schedule=/var/celery/celerybeat-schedule",
      ]
    volumes:
      - ./backend:/app
    tmpfs:
      - /var/celery:mode=1777
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app/frontend
    # node_modules is installed by the image at build time and preserved across
    # `up` cycles by the named-volume mount below. After a package.json change
    # on the host, rerun `docker compose run --rm frontend pnpm install`.
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  redis-data:
