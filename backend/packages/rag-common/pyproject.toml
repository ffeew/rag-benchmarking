[project]
name = "rag-common"
version = "0.1.0"
description = "Shared kernel for the SEC filings RAG benchmark: config, db models, schemas, storage, and provider clients."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "httpx>=0.28.0",
  "minio>=7.2.0",
  "pgvector>=0.3.6",
  "psycopg[binary,pool]>=3.2.0",
  "pydantic>=2.11.0",
  "pydantic-settings>=2.10.0",
  "pyyaml>=6.0.0",
  "sqlalchemy>=2.0.40",
  "structlog>=25.2.0",
  "tenacity>=9.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_common"]
