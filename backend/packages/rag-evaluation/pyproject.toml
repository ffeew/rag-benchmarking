[project]
name = "rag-evaluation"
version = "0.1.0"
description = "Evaluation runner for SEC filings RAG: per-case scoring, RAGAS metrics, ablation analysis. Imported in-process by the API."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "rag-common",
  "rag-retrieval",
  "ragas>=0.4.3",
  "sqlalchemy>=2.0.40",
  "structlog>=25.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_evaluation"]
