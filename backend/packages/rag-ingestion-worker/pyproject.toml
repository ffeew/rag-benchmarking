[project]
name = "rag-ingestion-worker"
version = "0.1.0"
description = "Celery worker for SEC filings ingestion. Owns the chunking + PDF + OCR parsing dependencies."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "celery[redis]>=5.5.0",
  "chonkie>=0.5.0",
  "docling>=2.30.0",
  "httpx>=0.28.0",
  "pydantic>=2.11.0",
  "pypdf>=5.5.0",
  "rag-common",
  "sqlalchemy>=2.0.40",
  "structlog>=25.2.0",
  "tenacity>=9.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_ingestion_worker"]
