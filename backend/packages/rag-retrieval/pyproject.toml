[project]
name = "rag-retrieval"
version = "0.1.0"
description = "Hybrid retrieval, query planning, generation, and verification for the SEC filings RAG benchmark."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "pydantic>=2.11.0",
  "pydantic-ai-slim[openai]>=1.96.0",
  "rag-common",
  "sqlalchemy>=2.0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_retrieval"]
