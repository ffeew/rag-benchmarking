[project]
name = "rag-evaluation-worker"
version = "0.1.0"
description = "Celery worker for SEC filings evaluation runs. Owns the RAGAS metric stack so it stays out of the ingestion worker."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "celery[redis]>=5.5.0",
  "rag-common",
  "rag-retrieval",
  "ragas>=0.4.3",
  "sqlalchemy>=2.0.40",
  "structlog>=25.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_evaluation_worker"]
