# Curated eval cases for the SEC filings RAG benchmark.
#
# IMPORTANT: page_number and evidence_text are template drafts based on typical SEC
# filing structure. Before treating any case as ground truth, run ingestion against
# this corpus and reconcile each expected_citation page_number against the actual
# parsed pages via the document drawer in the frontend.
#
# Distribution per ADR-0009 categories:
#   single_company_lookup   10
#   table_lookup            10
#   trend                    8
#   cross_company_comparison 8
#   sector_synthesis         6
#   multi_part               6
#   latest_filing            6
#   ambiguous                6
#   insufficient_evidence    8
#   ----------------------- --
#   total                   68

